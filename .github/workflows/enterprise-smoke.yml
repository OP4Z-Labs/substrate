name: enterprise-smoke

# Validates the full org-hub + consumer-repo `extends` pattern against
# the packaged tarball — the same path enterprise adopters take. Runs
# on every PR + nightly so regressions in the v3 extends primitive
# surface within hours.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # 04:00 UTC daily — keeps the github: source path warm (network)
    # and catches drift in github.com responses (e.g. shallow-clone
    # behavior changes).
    - cron: "0 4 * * *"
  workflow_dispatch:

# Cancel in-flight runs on the same PR when a new push arrives.
concurrency:
  group: enterprise-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: enterprise-smoke (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # jq is preinstalled on ubuntu-latest but verify so the script
      # fails fast with a clear pre-flight message if not.
      - name: Verify jq
        run: jq --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # The smoke script consumes the packaged tarball. Produce it
      # explicitly so we test the publish artifact, not the dev tree.
      - name: Pack substrate tarball
        run: |
          cd packages/substrate
          npm pack

      - name: Run enterprise smoke
        run: npm run smoke:enterprise

      # If anything failed, surface the workspace path for triage. The
      # script cleans up after itself on exit, so this is more of a
      # breadcrumb than a recoverable artifact.
      - name: Smoke failure summary (PR comment)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Enterprise smoke failed',
              '',
              `Matrix: \`node ${{ matrix.node }}\`.`,
              '',
              'The substrate v3 enterprise smoke test failed on this PR.',
              'Likely regression in the `extends` primitive — check the workflow',
              'log for the failing scenario. The script is at',
              '`packages/substrate/tests/smoke/enterprise-smoke.sh`.',
              '',
              'Run locally to reproduce:',
              '```',
              'cd packages/substrate && npm pack',
              'npm run smoke:enterprise',
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
