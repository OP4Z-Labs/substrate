name: Bug report
description: Something cadence does or doesn't do that you didn't expect.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce. Include the exact commands you ran.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: cadence-version
    attributes:
      label: Cadence version
      placeholder: "Output of `cadence --version`"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "e.g. v22.18.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux x86_64
        - Linux arm64
        - Windows (WSL2)
        - Other (describe in "What happened")
    validations:
      required: true

  - type: textarea
    id: doctor-output
    attributes:
      label: Output of `cadence doctor`
      description: Paste the full output. Helpful for catching environment issues.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, links to relevant code.
