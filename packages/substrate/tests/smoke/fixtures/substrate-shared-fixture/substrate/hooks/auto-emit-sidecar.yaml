schema_version: v2.0
id: auto-emit-sidecar
description: >-
  Org variant of auto-emit-sidecar. Captures workflow completion events
  for the org's central audit pipeline. The smoke test confirms this
  hook is discoverable from the merged registry.
trigger:
  - workflow-completion
matches:
  workflow-kind: audit
  exit-code: any
enabled: true
order: 10
step:
  type: run-deterministic
  command: 'echo "org-shared:auto-emit-sidecar fired"'
  pass-result: false
  fail-on-error: false
authors:
  - acme-platform
last_updated: "2026-05-16"
