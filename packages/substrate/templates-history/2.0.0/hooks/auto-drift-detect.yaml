schema_version: v2.0
id: auto-drift-detect
description: >-
  Proposal pipeline entry point. Fires after every workflow completion
  and runs the full drift→classify→queue pipeline:
    1. Reads the session-event-log for the just-completed workflow
    2. Runs the six drift detectors (ad-hoc steps, skipped steps,
       out-of-order, context-gaps, repeated prompts, rule-violation
       recurrence) against the manifest + loaded context
    3. Classifies findings into typed proposals
       (add-to-workflow-step, add-to-memory, add-to-rule, …)
    4. Writes pending proposals to substrate/proposals/pending/
  See plan §3.9 + §7 for the full design.
trigger:
  - workflow-completion
matches:
  exit-code: any
enabled: true
order: 50
step:
  # noop step type — resolves to a substrate-internal handler. The
  # `auto-drift-detect` handler is registered in `hook-dispatch.ts`
  # and runs in-process so it can share the orchestrator's already-
  # parsed manifest + session-log path without re-discovery.
  type: noop
  handler: auto-drift-detect
  # Advisory: pipeline failures don't fail the workflow.
  fail-on-error: false
authors:
  - substrate
last_updated: "2026-05-15"
