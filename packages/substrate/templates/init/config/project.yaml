# Project identity and stack metadata.
#
# This file is the YAML companion to substrate.config.json. Tooling that
# prefers YAML (CI configs, ops runbooks) reads from here; the substrate
# CLI itself reads substrate.config.json. Keep them in sync.

project:
  name: "{{PROJECT_NAME}}"
  short_code: "{{SHORT_CODE}}"
  description: ""

stacks:
  - python
  - typescript

paths:
  backend: apps/backend
  frontend: apps/frontend
  packages_ts: packages/typescript
  packages_python: packages/python
  docs: docs

# Cross-reference: the task-tag prefix used in commits is {{SHORT_CODE}}-NNN.
# Example: "fix(auth): clear expired sessions [{{SHORT_CODE}}-42]"
