[tool.poetry]
name = "{{NAME}}"
version = "0.0.1"
description = ""
authors = []
readme = "README.md"
packages = [{ include = "{{NAME_SNAKE}}" }]

[tool.poetry.dependencies]
python = "^3.12"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
ruff = "^0.6.0"
black = "^24.0.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
addopts = "-ra --cov={{NAME_SNAKE}} --cov-report=term-missing"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
